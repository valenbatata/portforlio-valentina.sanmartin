<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Style | Showroom</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --dark: #111; }
        * { margin:0; padding:0; box-sizing: border-box; }
        body { font-family: 'Raleway', sans-serif; background: #fff; color: var(--dark); }
        nav { padding: 25px; text-align: center; border-bottom: 1px solid #eee; text-transform: uppercase; letter-spacing: 4px; font-family: 'Oswald'; font-size: 1.5rem; }
        .hero { height: 60vh; background: #f0f0f0; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero h2 { font-family: 'Oswald'; font-size: 3rem; text-transform: uppercase; }
        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .img-box { aspect-ratio: 3/4; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 15px; }
        .img-1 { background-image: url('https://images.unsplash.com/photo-1525507119028-ed4c629a60a3?w=500'); }
        .img-2 { background-image: url('https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=500'); }
        .label { background: #fff; padding: 5px 15px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; }
        .btn-shop { display: block; width: 90%; margin: 30px auto; background: var(--dark); color: #fff; text-align: center; padding: 20px; text-decoration: none; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>
    <nav>URBAN STYLE</nav>
    <section class="hero">
        <div>
            <h2>New Season</h2>
            <p>Colección 2026</p>
        </div>
    </section>
    <div class="gallery">
        <div class="img-box img-1"><span class="label">Hoodies</span></div>
        <div class="img-box img-2"><span class="label">Oversize</span></div>
    </div>
    <a href="#" class="btn-shop">VER CATÁLOGO</a>
</body>
</html>

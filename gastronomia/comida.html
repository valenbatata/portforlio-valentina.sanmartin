<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabores Caseros | Menú</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #ff6b35; --yellow: #ffc300; --dark: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        .wpp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: #fff; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        header { height: 50vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1000&q=80') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; text-align: center; }
        header h1 { font-family: 'Bebas Neue', cursive; font-size: 4rem; color: var(--yellow); }
        .menu { padding: 50px 10%; background: #f9f9f9; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .food-item { background: #fff; padding: 20px; border-radius: 10px; border-left: 5px solid var(--orange); }
        .price { color: var(--orange); font-weight: bold; font-size: 1.2rem; }
        footer { background: var(--dark); color: #fff; padding: 30px; text-align: center; }
    </style>
</head>
<body>
    <a href="#" class="wpp-float">📱 ¡Pedir ahora!</a>
    <header>
        <h1>SABORES CASEROS</h1>
        <p>Lo mejor de Cipolletti a tu mesa</p>
    </header>
    <section class="menu">
        <h2 style="text-align:center; margin-bottom:30px;">Nuestro Menú</h2>
        <div class="menu-grid">
            <div class="food-item"><h3>Hamburguesa XL</h3><p>Con cheddar y bacon.</p><p class="price">$12.500</p></div>
            <div class="food-item"><h3>Alfajores Artesanales</h3><p>Maicena o chocolate.</p><p class="price">$1.200</p></div>
            <div class="food-item"><h3>Budín de Limón</h3><p>Casero y húmedo.</p><p class="price">$4.500</p></div>
        </div>
    </section>
    <footer><p>📍 Envíos en Cipolletti</p></footer>
</body>
</html>
